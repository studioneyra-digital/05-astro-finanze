<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finanze | Business theme</title>
  <meta name="description" content="Finanze — soluciones estratégicas de finanzas y consultoría para el crecimiento de tu negocio.">
  <!-- Open Graph -->
  <meta property="og:title" content="Finanze | Business theme">
  <meta property="og:description" content="Finanze — soluciones estratégicas de finanzas y consultoría para el crecimiento de tu negocio.">
  <meta property="og:image" content="assets/img/og-image.jpg">
  <meta property="og:type" content="website">
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <!-- Favicon -->
  <link rel="icon" href="assets/img/favicon.ico">

  <!-- Animate.css 4.1.1 (WOW.js la usa) -->
  <link rel="stylesheet" href="assets/css/animate.min.css">
  <!-- Swiper 11 -->
  <link rel="stylesheet" href="assets/css/swiper-bundle.min.css">
  <!-- Bootstrap Grid System -->
  <link rel="stylesheet" href="assets/css/bootstrap-grid.min.css">
  <!-- CSS propio (incluye @import Google Fonts) -->
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

  <main>
      <section class="hero-elite-v1">
        <div class="container">
          <div class="row">
            <div class="col-xl-12">
              <img class="hero-elite-v1__img" src="assets/img/lib/hero-bg-image-elite.jpg" alt="Consultoras revisando una estrategia financiera" loading="eager">
        <span class="hero-elite-v1__scrim"></span>
        <div class="hero-elite-v1__content">
          <span class="badge badge--transparent">
            <i data-lucide="asterisk" class="badge__icon"></i>
            <span class="badge__label">Finance &amp; Consulting Experts</span>
          </span>
          <h1 class="hero-elite-v1__title">
            <span class="hero-elite-v1__title-mask"><span class="hero-elite-v1__title-line">Driving growth through</span></span>
            <span class="hero-elite-v1__title-mask"><span class="hero-elite-v1__title-line">financial strategy</span></span>
          </h1>
          <p class="hero-elite-v1__desc">We help businesses and individuals navigate complex financial landscapes confidence through strategic planning.</p>
          <hr class="hero-elite-v1__divider">
          <div class="hero-elite-v1__footer">
            <a href="#" class="button-elite">
              <span class="button-elite__label">Get Started</span>
              <span class="button-elite__icon"><i data-lucide="arrow-right"></i></span>
            </a>
            <div class="hero-elite-v1__social">
              <div class="hero-elite-v1__social-row">
                <div class="hero-elite-v1__avatars">
                  <img class="hero-elite-v1__avatar" src="https://images.unsplash.com/photo-1560250097-0b93528c311a?q=80&amp;w=100&amp;auto=format&amp;fit=crop" alt="" loading="lazy">
                  <img class="hero-elite-v1__avatar" src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&amp;w=100&amp;auto=format&amp;fit=crop" alt="" loading="lazy">
                  <img class="hero-elite-v1__avatar" src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&amp;w=100&amp;auto=format&amp;fit=crop" alt="" loading="lazy">
                </div>
                <span class="hero-elite-v1__stars">
                  <i data-lucide="star"></i>
                  <i data-lucide="star"></i>
                  <i data-lucide="star"></i>
                  <i data-lucide="star"></i>
                </span>
                <span class="hero-elite-v1__rating-value">4.6</span>
              </div>
              <span class="hero-elite-v1__rating-caption">Our 100+ Happy Customers</span>
            </div>
          </div>
        </div>
            </div>
          </div>
      </div>        
        
      </section>
  </main>

  <!-- jQuery 3.7.1 (debe ir primero) -->
  <script src="assets/js/jquery-3.7.1.min.js"></script>
  <!-- Swiper -->
  <script src="assets/js/swiper-bundle.min.js"></script>
  <!-- WOW.js (animaciones CSS on scroll) -->
  <script src="assets/js/wow.min.js"></script>
  <!-- GSAP 3.12.5 + ScrollTrigger -->
  <script src="assets/js/gsap.min.js"></script>
  <script src="assets/js/ScrollTrigger.min.js"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <!-- JS propio (siempre al final) -->
  <script src="assets/js/main.js"></script>
</body>
</html>
